<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemoLingua — Jogo da Memória de Idiomas</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.tailwindcss.com" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --bg-primary: #fdf6ec;
  --bg-secondary: #fff8f0;
  --text-primary: #2d1b0e;
  --text-secondary: #6b4c2a;
  --card-back-1: #1a6b4a;
  --card-back-2: #0e4a32;
  --card-pattern: rgba(255,255,255,0.08);
  --card-front-pt: #fff7ed;
  --card-front-target: #eff6ff;
  --border-pt: #f59e0b;
  --border-target: #3b82f6;
  --accent: #e85d26;
  --success: #22c55e;
  --surface: #ffffff;
  --surface-alt: #fef3e2;
  --shadow: rgba(45,27,14,0.12);
  --overlay: rgba(253,246,236,0.92);
}

.dark {
  --bg-primary: #0c0f1a;
  --bg-secondary: #131829;
  --text-primary: #f0e6d6;
  --text-secondary: #a89478;
  --card-back-1: #14533c;
  --card-back-2: #0a3322;
  --card-front-pt: #1e1708;
  --card-front-target: #0c1425;
  --border-pt: #d97706;
  --border-target: #2563eb;
  --accent: #f97316;
  --success: #16a34a;
  --surface: #1a1f35;
  --surface-alt: #222842;
  --shadow: rgba(0,0,0,0.4);
  --overlay: rgba(12,15,26,0.94);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

.font-display { font-family: 'Lilita One', cursive; }

/* Animated background */
.bg-animated {
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(232,93,38,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(59,130,246,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(34,197,94,0.06) 0%, transparent 50%),
    var(--bg-primary);
}

.dark .bg-animated {
  background:
    radial-gradient(ellipse at 20% 50%, rgba(249,115,22,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(59,130,246,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(34,197,94,0.04) 0%, transparent 50%),
    var(--bg-primary);
}

.screen {
  display: none;
  position: relative;
  z-index: 1;
  min-height: 100vh;
  padding: 1.5rem;
}

.screen.active { display: flex; flex-direction: column; align-items: center; }

/* Title styling */
.game-title {
  font-family: 'Lilita One', cursive;
  font-size: clamp(2.2rem, 6vw, 3.5rem);
  background: linear-gradient(135deg, var(--accent), #f59e0b, var(--accent));
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 4s ease-in-out infinite;
  text-align: center;
  letter-spacing: 1px;
}

@keyframes shimmer {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* Language cards */
.lang-btn {
  background: var(--surface);
  border: 3px solid transparent;
  border-radius: 16px;
  padding: 1rem;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 2px 8px var(--shadow);
  text-align: center;
  min-width: 0;
}

.lang-btn:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px var(--shadow);
}

.lang-btn.selected {
  border-color: var(--accent);
  background: var(--surface-alt);
  transform: translateY(-2px);
  box-shadow: 0 4px 16px var(--shadow), 0 0 0 3px rgba(232,93,38,0.15);
}

.lang-flag { font-size: 2.5rem; display: block; margin-bottom: 0.3rem; }
.lang-name { font-weight: 700; font-size: 0.95rem; color: var(--text-primary); }

/* Difficulty buttons */
.diff-btn {
  background: var(--surface);
  border: 3px solid transparent;
  border-radius: 14px;
  padding: 0.8rem 1.5rem;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 2px 8px var(--shadow);
  font-weight: 700;
  font-size: 1rem;
  font-family: 'Nunito', sans-serif;
  color: var(--text-primary);
  width: 100%;
}

.diff-btn:hover { transform: translateY(-2px); }
.diff-btn.selected {
  border-color: var(--accent);
  background: var(--surface-alt);
}

/* Start button */
.start-btn {
  background: linear-gradient(135deg, #e85d26, #f59e0b);
  color: white;
  border: none;
  border-radius: 16px;
  padding: 1rem 3rem;
  font-family: 'Lilita One', cursive;
  font-size: 1.4rem;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 16px rgba(232,93,38,0.3);
  letter-spacing: 1px;
}

.start-btn:hover:not(:disabled) {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 8px 24px rgba(232,93,38,0.4);
}

.start-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

/* Memory cards */
.card-grid {
  display: grid;
  gap: 0.6rem;
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
}

.card-grid.pairs-4 { grid-template-columns: repeat(2, 1fr); }
.card-grid.pairs-6 { grid-template-columns: repeat(3, 1fr); }
.card-grid.pairs-8 { grid-template-columns: repeat(4, 1fr); }

@media (min-width: 480px) {
  .card-grid.pairs-4 { grid-template-columns: repeat(4, 1fr); }
  .card-grid.pairs-6 { grid-template-columns: repeat(4, 1fr); }
  .card-grid.pairs-8 { grid-template-columns: repeat(4, 1fr); }
  .card-grid { gap: 0.8rem; }
}

.memory-card {
  perspective: 1000px;
  cursor: pointer;
  aspect-ratio: 3/4;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.memory-card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
}

.memory-card.flipped .memory-card-inner {
  transform: rotateY(180deg);
}

.memory-card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding: 0.5rem;
}

/* Card back (face down) */
.memory-card-back {
  background: linear-gradient(145deg, var(--card-back-1), var(--card-back-2));
  border: 2px solid rgba(255,255,255,0.1);
  box-shadow: 0 3px 10px var(--shadow);
  position: relative;
}

.memory-card-back::before {
  content: '';
  position: absolute;
  inset: 6px;
  border: 2px dashed rgba(255,255,255,0.15);
  border-radius: 8px;
}

.memory-card-back .card-icon {
  font-size: 2rem;
  opacity: 0.4;
  color: white;
}

/* Card front (face up) */
.memory-card-front {
  transform: rotateY(180deg);
  border: 3px solid transparent;
  box-shadow: 0 3px 10px var(--shadow);
}

.memory-card-front.type-pt {
  background: var(--card-front-pt);
  border-color: var(--border-pt);
}

.memory-card-front.type-target {
  background: var(--card-front-target);
  border-color: var(--border-target);
}

.card-emoji {
  font-size: clamp(1.5rem, 5vw, 2.5rem);
  margin-bottom: 0.2rem;
  line-height: 1;
}

.card-word {
  font-weight: 800;
  font-size: clamp(0.7rem, 2.8vw, 1.1rem);
  text-align: center;
  line-height: 1.2;
  word-break: break-word;
  color: var(--text-primary);
}

.card-label {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 700;
  margin-top: 0.25rem;
  opacity: 0.6;
}

.card-label.label-pt { color: var(--border-pt); }
.card-label.label-target { color: var(--border-target); }

/* Card states */
.memory-card.matched .memory-card-front {
  box-shadow: 0 0 20px rgba(34,197,94,0.3);
}

.memory-card.matched { pointer-events: none; }

@keyframes cardBounce {
  0%, 100% { transform: scale(1); }
  40% { transform: scale(1.08); }
  60% { transform: scale(0.96); }
}

.memory-card.match-anim .memory-card-inner {
  animation: cardBounce 0.5s ease;
}

@keyframes cardShake {
  0%, 100% { transform: rotateY(180deg) translateX(0); }
  20% { transform: rotateY(180deg) translateX(-5px); }
  40% { transform: rotateY(180deg) translateX(5px); }
  60% { transform: rotateY(180deg) translateX(-3px); }
  80% { transform: rotateY(180deg) translateX(3px); }
}

.memory-card.no-match-anim .memory-card-inner {
  animation: cardShake 0.4s ease;
}

/* Game header */
.game-header {
  background: var(--surface);
  border-radius: 16px;
  padding: 0.8rem 1.2rem;
  box-shadow: 0 2px 8px var(--shadow);
  width: 100%;
  max-width: 600px;
  margin-bottom: 1rem;
}

.stat-item {
  text-align: center;
}

.stat-value {
  font-family: 'Lilita One', cursive;
  font-size: 1.3rem;
  color: var(--accent);
}

.stat-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 700;
  opacity: 0.5;
}

/* Loading */
.loader-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  min-height: 60vh;
}

@keyframes bounce-loader {
  0%, 80%, 100% { transform: scale(0) rotate(0); }
  40% { transform: scale(1) rotate(180deg); }
}

.loader-dots {
  display: flex;
  gap: 0.8rem;
}

.loader-dot {
  width: 1.2rem;
  height: 1.2rem;
  border-radius: 50%;
  animation: bounce-loader 1.4s infinite ease-in-out;
}

.loader-dot:nth-child(1) { background: #e85d26; animation-delay: -0.32s; }
.loader-dot:nth-child(2) { background: #f59e0b; animation-delay: -0.16s; }
.loader-dot:nth-child(3) { background: #3b82f6; animation-delay: 0s; }

/* Results */
.results-card {
  background: var(--surface);
  border-radius: 24px;
  padding: 2rem;
  box-shadow: 0 8px 32px var(--shadow);
  text-align: center;
  max-width: 400px;
  width: 100%;
}

.stars-container { font-size: 2.5rem; margin: 1rem 0; }
.star-filled { color: #f59e0b; }
.star-empty { color: #d4d4d4; }
.dark .star-empty { color: #374151; }

/* Match popup */
.match-popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: var(--surface);
  border-radius: 20px;
  padding: 1.5rem 2rem;
  box-shadow: 0 8px 32px var(--shadow);
  z-index: 50;
  text-align: center;
  border: 3px solid var(--success);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
}

.match-popup.show {
  transform: translate(-50%, -50%) scale(1);
}

/* Confetti */
.confetti-piece {
  position: fixed;
  width: 10px;
  height: 10px;
  z-index: 100;
  pointer-events: none;
}

@keyframes confetti-fall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.3); }
}

/* Back button */
.back-btn {
  background: var(--surface-alt);
  border: 2px solid transparent;
  border-radius: 12px;
  padding: 0.5rem 1rem;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  color: var(--text-secondary);
  transition: all 0.2s;
}

.back-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* Entrance animations */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.animate-in {
  animation: fadeInUp 0.5s ease forwards;
  opacity: 0;
}

/* Subtitle */
.subtitle {
  color: var(--text-secondary);
  font-size: 1.05rem;
  font-weight: 600;
  text-align: center;
}

/* Section label */
.section-label {
  font-family: 'Lilita One', cursive;
  font-size: 1.15rem;
  color: var(--text-secondary);
  text-align: center;
}

/* Scrollable */
.content-wrap {
  width: 100%;
  max-width: 500px;
}

/* Custom modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 60;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}

.modal-box {
  background: var(--surface);
  border-radius: 20px;
  padding: 2rem;
  max-width: 360px;
  width: 100%;
  text-align: center;
  box-shadow: 0 16px 48px var(--shadow);
}
</style>
</head>
<body>

<div class="bg-animated"></div>

<!-- MENU SCREEN -->
<div id="menu-screen" class="screen active">
  <div class="content-wrap" style="display:flex;flex-direction:column;align-items:center;gap:1.2rem;padding-top:1rem;">
    <div class="animate-in" style="animation-delay:0s;">
      <div style="font-size:3rem;margin-bottom:0.2rem;text-align:center;">🧠</div>
      <h1 class="game-title">MemoLingua</h1>
      <p class="subtitle" style="margin-top:0.3rem;">Jogue e aprenda vocabulário em outros idiomas!</p>
    </div>

    <div class="animate-in" style="animation-delay:0.1s;width:100%;">
      <p class="section-label" style="margin-bottom:0.6rem;">🌍 Escolha o idioma</p>
      <div id="lang-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem;"></div>
    </div>

    <div class="animate-in" style="animation-delay:0.2s;width:100%;">
      <p class="section-label" style="margin-bottom:0.6rem;">📊 Nível de dificuldade</p>
      <div id="diff-grid" style="display:flex;gap:0.6rem;"></div>
    </div>

    <div class="animate-in" style="animation-delay:0.3s;">
      <button id="start-btn" class="start-btn" disabled onclick="startGame()">
        <i class="fa-solid fa-play" style="margin-right:0.4rem;"></i>JOGAR
      </button>
    </div>
  </div>
</div>

<!-- LOADING SCREEN -->
<div id="loading-screen" class="screen">
  <div class="loader-container">
    <div class="loader-dots">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
    <p style="font-weight:700;font-size:1.1rem;color:var(--text-secondary);">Preparando suas cartas...</p>
    <p id="loading-sub" style="font-size:0.85rem;color:var(--text-secondary);opacity:0.7;">Gerando vocabulário com IA ✨</p>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <div style="width:100%;max-width:600px;display:flex;flex-direction:column;align-items:center;gap:0.6rem;">
    <div style="width:100%;display:flex;justify-content:space-between;align-items:center;">
      <button class="back-btn" onclick="backToMenu()">
        <i class="fa-solid fa-arrow-left" style="margin-right:0.3rem;"></i>Voltar
      </button>
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <span id="game-lang-flag" style="font-size:1.3rem;"></span>
        <span id="game-diff-label" style="font-weight:700;font-size:0.85rem;color:var(--text-secondary);"></span>
      </div>
    </div>

    <div class="game-header">
      <div style="display:flex;justify-content:space-around;">
        <div class="stat-item">
          <div class="stat-value" id="stat-time">0:00</div>
          <div class="stat-label">Tempo</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-moves">0</div>
          <div class="stat-label">Jogadas</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-pairs">0/0</div>
          <div class="stat-label">Pares</div>
        </div>
      </div>
    </div>

    <div id="card-grid" class="card-grid"></div>

    <div style="display:flex;gap:0.5rem;margin-top:0.5rem;align-items:center;">
      <span style="width:14px;height:14px;border-radius:4px;background:var(--border-pt);display:inline-block;"></span>
      <span style="font-size:0.75rem;font-weight:700;color:var(--text-secondary);">Português</span>
      <span style="width:14px;height:14px;border-radius:4px;background:var(--border-target);display:inline-block;margin-left:0.8rem;"></span>
      <span id="legend-target" style="font-size:0.75rem;font-weight:700;color:var(--text-secondary);"></span>
    </div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="results-screen" class="screen">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:1.5rem;">
    <div class="results-card animate-in">
      <div style="font-size:3rem;margin-bottom:0.5rem;">🎉</div>
      <h2 class="font-display" style="font-size:1.8rem;color:var(--accent);">Parabéns!</h2>
      <p style="color:var(--text-secondary);font-weight:600;margin-bottom:1rem;">Você completou o jogo!</p>
      <div id="results-stars" class="stars-container"></div>
      <div style="display:flex;justify-content:center;gap:2rem;margin:1rem 0;">
        <div class="stat-item">
          <div class="stat-value" id="result-time">0:00</div>
          <div class="stat-label">Tempo</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="result-moves">0</div>
          <div class="stat-label">Jogadas</div>
        </div>
      </div>
      <div id="results-words" style="margin:1rem 0;text-align:left;max-height:200px;overflow-y:auto;"></div>
      <div style="display:flex;flex-direction:column;gap:0.6rem;margin-top:1rem;">
        <button class="start-btn" style="font-size:1.1rem;padding:0.8rem 2rem;" onclick="startGame()">
          <i class="fa-solid fa-rotate-right" style="margin-right:0.4rem;"></i>Jogar Novamente
        </button>
        <button class="back-btn" style="width:100%;padding:0.7rem;" onclick="backToMenu()">
          <i class="fa-solid fa-house" style="margin-right:0.3rem;"></i>Menu Principal
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Match popup -->
<div id="match-popup" class="match-popup">
  <div style="font-size:2rem;margin-bottom:0.3rem;">✅</div>
  <div id="match-popup-text" style="font-weight:800;font-size:1.1rem;"></div>
</div>

<script>
// ===== DARK MODE =====
if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
  document.documentElement.classList.add('dark');
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(event) {
  if (event.matches) {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
});

// ===== CONSTANTS =====
var LANGUAGES = [
  { id: 'english', name: 'Inglês', flag: '🇺🇸', color: '#3b82f6' },
  { id: 'spanish', name: 'Espanhol', flag: '🇪🇸', color: '#ef4444' },
  { id: 'french', name: 'Francês', flag: '🇫🇷', color: '#8b5cf6' },
  { id: 'italian', name: 'Italiano', flag: '🇮🇹', color: '#22c55e' },
  { id: 'german', name: 'Alemão', flag: '🇩🇪', color: '#eab308' },
  { id: 'japanese', name: 'Japonês', flag: '🇯🇵', color: '#ec4899' }
];

var DIFFICULTIES = [
  { id: 'easy', name: 'Fácil', pairs: 4, icon: '⭐', desc: '8 cartas' },
  { id: 'medium', name: 'Médio', pairs: 6, icon: '⭐⭐', desc: '12 cartas' },
  { id: 'hard', name: 'Difícil', pairs: 8, icon: '⭐⭐⭐', desc: '16 cartas' }
];

// ===== FALLBACK WORD SETS =====
var FALLBACK = {
  english: {
    easy: [
      {emoji:'🐱',pt:'Gato',target:'Cat'},{emoji:'🐶',pt:'Cachorro',target:'Dog'},
      {emoji:'🏠',pt:'Casa',target:'House'},{emoji:'☀️',pt:'Sol',target:'Sun'},
      {emoji:'💧',pt:'Água',target:'Water'},{emoji:'📖',pt:'Livro',target:'Book'},
      {emoji:'🌙',pt:'Lua',target:'Moon'},{emoji:'🌳',pt:'Árvore',target:'Tree'}
    ],
    medium: [
      {emoji:'🦋',pt:'Borboleta',target:'Butterfly'},{emoji:'🏖️',pt:'Praia',target:'Beach'},
      {emoji:'🌧️',pt:'Chuva',target:'Rain'},{emoji:'🤝',pt:'Amigo',target:'Friend'},

// ===== JSON EXTRACTION =====
function extractJSON(text) {
  var patterns = [/```(?:json)?\s*([\s\S]*?)```/, /(\[[\s\S]*?\])/];
  for (var i = 0; i < patterns.length; i++) {
    var match = text.match(patterns[i]);
    if (match) {
      try { return JSON.parse(match[1].trim()); } catch (e) { /* continue */ }
    }
  }
  try { return JSON.parse(text.trim()); } catch (e) { return null; }
}

// ===== GENERATE WORDS =====
function getNumPairs() {
  var diff = DIFFICULTIES.find(function(d) { return d.id === state.difficulty; });
  return diff ? diff.pairs : 4;
}

function getFallbackWords() {
  var langWords = FALLBACK[state.language];
  if (!langWords) { langWords = FALLBACK.english; }
  var pool = langWords[state.difficulty] || langWords.easy;
  var numPairs = getNumPairs();
  var shuffled = pool.slice().sort(function() { return Math.random() - 0.5; });
  return shuffled.slice(0, numPairs);
}

function getLangName(langId) {
  var lang = LANGUAGES.find(function(l) { return l.id === langId; });
  return lang ? lang.name : langId;
}

function getLangFlag(langId) {
  var lang = LANGUAGES.find(function(l) { return l.id === langId; });
  return lang ? lang.flag : '🌐';
}

var handlerRegistered = false;
var resolveWords = null;

function registerWordHandler() {
  if (handlerRegistered) return;
  handlerRegistered = true;
  try {
    window.Poe.registerHandler('memo-words', function(result) {
      var msg = result.responses[0];
      if (msg.status === 'complete') {
        var words = extractJSON(msg.content);
        if (words && Array.isArray(words) && words.length > 0) {
          if (resolveWords) resolveWords(words);
        } else {
          if (resolveWords) resolveWords(null);
        }
      } else if (msg.status === 'error') {
        if (resolveWords) resolveWords(null);
      }
    });
  } catch (e) {
    handlerRegistered = false;
  }
}

async function generateWords() {
  var numPairs = getNumPairs();
  var langName = getLangName(state.language);
  var diffName = state.difficulty === 'easy' ? 'fácil (palavras simples e comuns do dia-a-dia)' :
                 state.difficulty === 'medium' ? 'médio (palavras de dificuldade intermediária)' :
                 'difícil (palavras mais complexas, abstratas ou menos comuns)';

  var prompt = 'Gere exatamente ' + numPairs + ' pares de palavras para um jogo da memória de vocabulário. ' +
    'Idioma de origem: Português. Idioma alvo: ' + langName + '. ' +
    'Nível: ' + diffName + '. ' +
    'Retorne APENAS um JSON array sem nenhum texto adicional, no formato: ' +
    '[{"emoji":"🐱","pt":"Gato","target":"Cat"},{"emoji":"🐶","pt":"Cachorro","target":"Dog"},...] ' +
    'Cada item precisa ter um emoji que represente a palavra visualmente. ' +
    'NÃO repita palavras. Retorne SOMENTE o JSON, sem explicações.';

  if (!window.Poe) {
    return null;
  }

  registerWordHandler();

  return new Promise(function(resolve) {
    resolveWords = resolve;
    var timeout = setTimeout(function() {
      resolveWords = null;
      resolve(null);
    }, 20000);

    var originalResolve = resolve;
    resolveWords = function(val) {
      clearTimeout(timeout);
      resolveWords = null;
      originalResolve(val);
    };

    window.Poe.sendUserMessage('@Grok-4.1-Fast-Non-Reasoning ' + prompt, {
      handler: 'memo-words',
      stream: false,
      openChat: false,
      parameters: {}
    }).catch(function() {
      clearTimeout(timeout);
      resolveWords = null;
      originalResolve(null);
    });
  });
}

// ===== START GAME =====
async function startGame() {
  showScreen('loading-screen');
  document.getElementById('loading-sub').textContent = 'Gerando vocabulário com IA ✨';

  var words = null;
  try {
    words = await generateWords();
  } catch (e) {
    words = null;
  }

  if (!words || words.length < getNumPairs()) {
    document.getElementById('loading-sub').textContent = 'Usando vocabulário padrão...';
    words = getFallbackWords();
    await new Promise(function(r) { setTimeout(r, 500); });
  }

  state.wordPairs = words.slice(0, getNumPairs());
  initGameBoard();
  showScreen('game-screen');
}

// ===== GAME BOARD =====
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function initGameBoard() {
  var numPairs = state.wordPairs.length;
  state.totalPairs = numPairs;
  state.matchedPairIds = [];
  state.flippedIndices = [];
  state.moves = 0;
  state.isLocked = false;

  // Set header info
  document.getElementById('game-lang-flag').textContent = getLangFlag(state.language);
  document.getElementById('game-diff-label').textContent = getLangName(state.language) + ' • ' +
    DIFFICULTIES.find(function(d) { return d.id === state.difficulty; }).name;
  document.getElementById('legend-target').textContent = getLangName(state.language);

  // Build cards array
  var cards = [];
  state.wordPairs.forEach(function(pair, idx) {
    cards.push({ pairId: idx, type: 'pt', word: pair.pt, emoji: pair.emoji, targetWord: pair.target });
    cards.push({ pairId: idx, type: 'target', word: pair.target, emoji: pair.emoji, ptWord: pair.pt });
  });
  state.cards = shuffle(cards);

  // Set grid class
  var grid = document.getElementById('card-grid');
  grid.className = 'card-grid pairs-' + numPairs;
  grid.innerHTML = '';

  state.cards.forEach(function(card, index) {
    var cardEl = document.createElement('div');
    cardEl.className = 'memory-card';
    cardEl.setAttribute('data-index', index);
    cardEl.onclick = function() { flipCard(index); };

    var inner = document.createElement('div');
    inner.className = 'memory-card-inner';

    // Back (face down)
    var back = document.createElement('div');
    back.className = 'memory-card-face memory-card-back';
    back.innerHTML = '<span class="card-icon"><i class="fa-solid fa-question"></i></span>';

    // Front (face up)
    var front = document.createElement('div');
    front.className = 'memory-card-face memory-card-front type-' + card.type;
    if (card.type === 'pt') {
      front.innerHTML = '<span class="card-emoji">' + card.emoji + '</span>' +
        '<span class="card-word">' + card.word + '</span>' +
        '<span class="card-label label-pt">PT</span>';
    } else {
      front.innerHTML = '<span class="card-emoji">' + card.emoji + '</span>' +
        '<span class="card-word">' + card.word + '</span>' +
        '<span class="card-label label-target">' + getLangName(state.language).substring(0, 3).toUpperCase() + '</span>';
    }

    inner.appendChild(back);
    inner.appendChild(front);
    cardEl.appendChild(inner);
    grid.appendChild(cardEl);
  });

  // Stats
  updateStats();
  startTimer();
}

function updateStats() {
  document.getElementById('stat-moves').textContent = state.moves;
  document.getElementById('stat-pairs').textContent = state.matchedPairIds.length + '/' + state.totalPairs;
}

// ===== TIMER =====
function startTimer() {
  clearInterval(state.timerInterval);
  state.startTime = Date.now();
  document.getElementById('stat-time').textContent = '0:00';
  state.timerInterval = setInterval(function() {
    var elapsed = Math.floor((Date.now() - state.startTime) / 1000);
    var min = Math.floor(elapsed / 60);
    var sec = elapsed % 60;
    document.getElementById('stat-time').textContent = min + ':' + (sec < 10 ? '0' : '') + sec;
  }, 1000);
}

function getElapsedTime() {
  return Math.floor((Date.now() - state.startTime) / 1000);
}

function formatTime(seconds) {
  var min = Math.floor(seconds / 60);
  var sec = seconds % 60;
  return min + ':' + (sec < 10 ? '0' : '') + sec;
}

// ===== CARD FLIP LOGIC =====
function flipCard(index) {
  if (state.isLocked) return;
  if (state.flippedIndices.includes(index)) return;
  if (state.matchedPairIds.includes(state.cards[index].pairId)) return;

  var cardEl = document.querySelectorAll('.memory-card')[index];
  cardEl.classList.add('flipped');
  state.flippedIndices.push(index);

  if (state.flippedIndices.length === 2) {
    state.moves++;
    state.isLocked = true;
    updateStats();

    var idx1 = state.flippedIndices[0];
    var idx2 = state.flippedIndices[1];
    var card1 = state.cards[idx1];
    var card2 = state.cards[idx2];

    if (card1.pairId === card2.pairId && card1.type !== card2.type) {
      // Match!
      setTimeout(function() { handleMatch(idx1, idx2); }, 500);
    } else {
      // No match
      setTimeout(function() { handleNoMatch(idx1, idx2); }, 900);
    }
  }
}

function handleMatch(idx1, idx2) {
  var pairId = state.cards[idx1].pairId;
  state.matchedPairIds.push(pairId);

  var allCards = document.querySelectorAll('.memory-card');
  allCards[idx1].classList.add('matched', 'match-anim');
  allCards[idx2].classList.add('matched', 'match-anim');

  // Show match popup
  var pair = state.wordPairs[pairId];
  showMatchPopup(pair.emoji + ' ' + pair.pt + ' = ' + pair.target);

  state.flippedIndices = [];
  state.isLocked = false;
  updateStats();

  // Check win
  if (state.matchedPairIds.length === state.totalPairs) {
    setTimeout(endGame, 800);
  }
}

function handleNoMatch(idx1, idx2) {
  var allCards = document.querySelectorAll('.memory-card');
  allCards[idx1].classList.add('no-match-anim');
  allCards[idx2].classList.add('no-match-anim');

  setTimeout(function() {
    allCards[idx1].classList.remove('flipped', 'no-match-anim');
    allCards[idx2].classList.remove('flipped', 'no-match-anim');
    state.flippedIndices = [];
    state.isLocked = false;
  }, 400);
}

// ===== MATCH POPUP =====
function showMatchPopup(text) {
  var popup = document.getElementById('match-popup');
  document.getElementById('match-popup-text').textContent = text;
  popup.classList.add('show');
  setTimeout(function() { popup.classList.remove('show'); }, 1200);
}

// ===== END GAME =====
function endGame() {
  clearInterval(state.timerInterval);
  var elapsed = getElapsedTime();
  var moves = state.moves;
  var pairs = state.totalPairs;

  // Calculate stars
  var perfectMoves = pairs;
  var ratio = moves / perfectMoves;
  var stars = 3;
  if (ratio > 2.5) { stars = 1; }
  else if (ratio > 1.5) { stars = 2; }

  // Show results
  document.getElementById('result-time').textContent = formatTime(elapsed);
  document.getElementById('result-moves').textContent = moves;

  var starsHTML = '';
  for (var i = 0; i < 3; i++) {
    starsHTML += '<span class="' + (i < stars ? 'star-filled' : 'star-empty') + '">★</span>';
  }
  document.getElementById('results-stars').innerHTML = starsHTML;

  // Word list
  var wordsHTML = '<div style="padding:0.5rem;background:var(--surface-alt);border-radius:10px;">' +
    '<p style="font-weight:700;font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;opacity:0.5;margin-bottom:0.5rem;">Vocabulário aprendido</p>';
  state.wordPairs.forEach(function(pair) {
    wordsHTML += '<div style="display:flex;align-items:center;gap:0.5rem;padding:0.3rem 0;border-bottom:1px solid rgba(128,128,128,0.1);">' +
      '<span style="font-size:1.2rem;">' + pair.emoji + '</span>' +
      '<span style="font-weight:700;font-size:0.85rem;">' + pair.pt + '</span>' +
      '<span style="opacity:0.4;">→</span>' +
      '<span style="font-weight:600;font-size:0.85rem;color:var(--border-target);">' + pair.target + '</span>' +
      '</div>';
  });
  wordsHTML += '</div>';
  document.getElementById('results-words').innerHTML = wordsHTML;

  showScreen('results-screen');
  launchConfetti();
}

// ===== CONFETTI =====
function launchConfetti() {
  var colors = ['#e85d26', '#f59e0b', '#3b82f6', '#22c55e', '#ec4899', '#8b5cf6'];
  var container = document.body;
  for (var i = 0; i < 60; i++) {
    var piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.top = '-10px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.width = (Math.random() * 8 + 5) + 'px';
    piece.style.height = (Math.random() * 8 + 5) + 'px';
    piece.style.animation = 'confetti-fall ' + (Math.random() * 2 + 1.5) + 's ease-out forwards';
    piece.style.animationDelay = (Math.random() * 0.5) + 's';
    container.appendChild(piece);
    (function(el) {
      setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 4000);
    })(piece);
  }
}

// ===== INIT =====
initMenu();
