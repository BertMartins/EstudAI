<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forca Multilingue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #f7f3ea; --bg-2: #ffffff; --bg-3: #f0ece3;
            --border: #ddd6c8; --text-1: #1e2a3a; --text-2: #6a7889;
            --gold: #c08b10; --gold-glow: rgba(192,139,16,0.2);
            --teal: #1a9e7a; --teal-glow: rgba(26,158,122,0.1);
            --red: #c9403a; --red-glow: rgba(201,64,58,0.1);
            --green: #2a8e3a; --green-glow: rgba(42,142,58,0.1);
            --gallows: #6a7889; --person: #c08b10;
        }
        :root.dark {
            --bg-1: #0f1318; --bg-2: #181e28; --bg-3: #222a38;
            --border: #2e3a4e; --text-1: #f0ead6; --text-2: #8fa0b8;
            --gold: #f5b731; --gold-glow: rgba(245,183,49,0.2);
            --teal: #2dd4a8; --teal-glow: rgba(45,212,168,0.15);
            --red: #ef6461; --red-glow: rgba(239,100,97,0.15);
            --green: #3fb950; --green-glow: rgba(63,185,80,0.15);
            --gallows: #5a6d85; --person: #f5b731;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Nunito',sans-serif;background:var(--bg-1);color:var(--text-1);
            min-height:100vh;min-height:100dvh;overflow-x:hidden;position:relative;
        }
        body::before{
            content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
            background:radial-gradient(ellipse at 20% 0%,var(--gold-glow) 0%,transparent 60%),
                        radial-gradient(ellipse at 80% 100%,var(--teal-glow) 0%,transparent 60%);
        }
        h1,h2,h3{font-family:'Fredoka',sans-serif;}
        #app{position:relative;width:100%;max-width:520px;margin:0 auto;z-index:1;}
        .screen{
            display:none;flex-direction:column;align-items:center;padding:20px 16px;
            opacity:0;transform:translateY(12px);transition:opacity .35s ease,transform .35s ease;
            overflow-y:auto;-webkit-overflow-scrolling:touch;width:100%;
        }
        .screen.active{display:flex;opacity:1;transform:translateY(0);}

        /* CONNECTION STATUS */
        .connection-badge{
            display:inline-flex;align-items:center;gap:6px;
            padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;
            font-family:'Nunito',sans-serif;letter-spacing:0.3px;
            margin-bottom:6px;animation:fadeIn .5s ease-out .15s both;
            transition:all .3s ease;
        }
        .connection-badge.connected{
            background:var(--green-glow);border:1.5px solid var(--green);color:var(--green);
        }
        .connection-badge.disconnected{
            background:var(--red-glow);border:1.5px solid var(--red);color:var(--red);
        }
        .connection-dot{
            width:8px;height:8px;border-radius:50%;flex-shrink:0;
        }
        .connection-badge.connected .connection-dot{
            background:var(--green);
            box-shadow:0 0 6px var(--green);
            animation:pulse-dot 2s ease-in-out infinite;
        }
        .connection-badge.disconnected .connection-dot{
            background:var(--red);
        }
        .connection-key-hint{
            text-align:center;font-size:11px;color:var(--text-2);opacity:.6;
            margin-bottom:16px;
        }
        .key-input-area{
            width:100%;margin-bottom:16px;animation:fadeIn .4s ease-out;
        }
        .key-input-row{
            display:flex;gap:8px;align-items:center;
        }
        .key-input{
            flex:1;padding:10px 14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;
            background:var(--bg-2);color:var(--text-1);border:2px solid var(--border);border-radius:10px;
            outline:none;transition:border-color .2s;
        }
        .key-input:focus{border-color:var(--gold);}
        .key-input::placeholder{color:var(--text-2);opacity:.5;}
        .key-connect-btn{
            padding:10px 18px;font-family:'Fredoka',sans-serif;font-size:14px;font-weight:600;
            color:#fff;background:linear-gradient(135deg,var(--teal),#158a64);border:none;border-radius:10px;
            cursor:pointer;transition:all .2s ease;white-space:nowrap;
        }
        .key-connect-btn:hover{transform:translateY(-1px);box-shadow:0 4px 15px var(--teal-glow);}
        .key-disconnect-btn{
            padding:6px 12px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;
            color:var(--text-2);background:var(--bg-3);border:1.5px solid var(--border);border-radius:8px;
            cursor:pointer;transition:all .2s ease;margin-top:4px;
        }
        .key-disconnect-btn:hover{border-color:var(--red);color:var(--red);}
        @keyframes pulse-dot{
            0%,100%{opacity:1;box-shadow:0 0 6px var(--green);}
            50%{opacity:.5;box-shadow:0 0 2px var(--green);}
        }

        /* MENU */
        .menu-header{text-align:center;margin-bottom:24px;animation:slideDown .5s ease-out;}
        .menu-icon{font-size:48px;display:block;margin-bottom:6px;}
        .menu-title{font-size:clamp(26px,7vw,42px);font-weight:700;color:var(--gold);line-height:1.1;margin-bottom:4px;}
        .menu-subtitle{font-size:15px;color:var(--text-2);font-weight:500;animation:fadeIn .5s ease-out .2s both;}
        .section-label{
            font-family:'Fredoka',sans-serif;font-size:14px;font-weight:600;color:var(--text-2);
            margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;width:100%;text-align:left;
        }
        .lang-grid{
            display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;
            margin-bottom:24px;animation:slideUp .5s ease-out .3s both;
        }
        .lang-card{
            display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg-2);
            border:2px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s ease;
            font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--text-1);text-align:left;
        }
        .lang-card:hover{border-color:var(--gold);background:var(--bg-3);}
        .lang-card.selected{border-color:var(--gold);background:var(--gold-glow);box-shadow:0 0 20px var(--gold-glow);}
        .lang-flag{font-size:24px;flex-shrink:0;}
        .diff-grid{
            display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;
            margin-bottom:24px;animation:slideUp .5s ease-out .4s both;
        }
        .diff-btn{
            display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 8px;
            background:var(--bg-2);border:2px solid var(--border);border-radius:12px;cursor:pointer;
            transition:all .2s ease;font-family:'Nunito',sans-serif;color:var(--text-1);
        }
        .diff-btn:hover{border-color:var(--gold);background:var(--bg-3);}
        .diff-btn.selected{border-color:var(--gold);background:var(--gold-glow);box-shadow:0 0 20px var(--gold-glow);}
        .diff-stars{font-size:16px;color:var(--gold);letter-spacing:2px;}
        .diff-name{font-size:15px;font-weight:700;}
        .diff-desc{font-size:11px;color:var(--text-2);text-align:center;line-height:1.3;}
        .play-btn{
            width:100%;padding:16px;font-family:'Fredoka',sans-serif;font-size:20px;font-weight:600;
            color:#fff;background:linear-gradient(135deg,var(--gold),#d4940a);border:none;border-radius:14px;
            cursor:pointer;transition:all .2s ease;animation:slideUp .5s ease-out .5s both;
            text-shadow:0 1px 2px rgba(0,0,0,.2);
        }
        .play-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 30px var(--gold-glow);}
        .play-btn:disabled{opacity:.4;cursor:not-allowed;}
        .stats-bar{display:flex;justify-content:center;gap:24px;margin-top:20px;animation:fadeIn .5s ease-out .6s both;}
        .stat-item{text-align:center;}
        .stat-value{font-family:'Fredoka',sans-serif;font-size:22px;font-weight:700;color:var(--gold);}
        .stat-label{font-size:11px;color:var(--text-2);text-transform:uppercase;letter-spacing:1px;}

        /* LOADING */
        .loading-content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:20px;min-height:60vh;}
        .loading-spinner{
            width:56px;height:56px;border:4px solid var(--border);border-top-color:var(--gold);
            border-radius:50%;animation:spin .8s linear infinite;
        }
        .loading-text{font-family:'Fredoka',sans-serif;font-size:20px;font-weight:600;}
        .loading-subtext{font-size:14px;color:var(--text-2);max-width:280px;}
        .loading-dots::after{content:'';animation:dots 1.5s steps(4,end) infinite;}

        /* GAME */
        .game-header{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px;}
        .game-badges{display:flex;gap:8px;flex-wrap:wrap;}
        .badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--bg-3);border:1px solid var(--border);color:var(--text-2);}
        .lives-display{display:flex;align-items:center;gap:4px;font-weight:700;font-size:15px;}
        .lives-hearts{color:var(--red);letter-spacing:1px;font-size:16px;}
        .hangman-container{width:100%;max-width:200px;margin:0 auto 12px;}
        .hangman-svg{width:100%;height:auto;}
        .hangman-part{opacity:0;transition:opacity .3s ease;}
        .hangman-part.visible{opacity:1;}
        .hint-box{width:100%;background:var(--gold-glow);border-left:4px solid var(--gold);border-radius:0 12px 12px 0;padding:12px 16px;margin-bottom:16px;}
        .hint-label{font-size:12px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px;}
        .hint-text{font-size:16px;font-weight:600;color:var(--text-1);line-height:1.4;}
        .word-display{display:flex;justify-content:center;flex-wrap:wrap;gap:6px;margin-bottom:20px;min-height:56px;align-items:center;}
        .letter-box{
            width:clamp(30px,9vw,48px);height:clamp(38px,11vw,56px);display:flex;align-items:center;
            justify-content:center;font-family:'Fredoka',sans-serif;font-size:clamp(18px,5vw,28px);
            font-weight:700;border-bottom:3px solid var(--border);color:var(--text-1);transition:all .2s ease;
        }
        .letter-box.revealed{border-bottom-color:var(--green);color:var(--green);animation:letterPop .3s ease-out;}
        .letter-box.wrong-reveal{border-bottom-color:var(--red);color:var(--red);animation:letterPop .3s ease-out;}
        .keyboard{width:100%;display:flex;flex-direction:column;gap:6px;align-items:center;margin-bottom:12px;}
        .keyboard-row{display:flex;gap:4px;justify-content:center;}
        .key-btn{
            font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;
            width:clamp(28px,8.5vw,42px);height:clamp(38px,11vw,48px);
            border:2px solid var(--border);border-radius:8px;background:var(--bg-2);color:var(--text-1);
            cursor:pointer;transition:all .15s ease;display:flex;align-items:center;justify-content:center;
            user-select:none;-webkit-tap-highlight-color:transparent;
        }
        .key-btn:hover:not(:disabled){background:var(--bg-3);border-color:var(--gold);transform:translateY(-1px);}
        .key-btn:active:not(:disabled){transform:translateY(1px);}
        .key-btn.correct{background:var(--green-glow);border-color:var(--green);color:var(--green);}
        .key-btn.wrong{background:var(--red-glow);border-color:var(--red);color:var(--red);opacity:.5;}
        .key-btn:disabled{cursor:default;}
        .game-back-btn{
            font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--text-2);
            background:none;border:none;cursor:pointer;padding:8px 16px;transition:color .2s;
        }
        .game-back-btn:hover{color:var(--gold);}

        /* RESULT */
        .result-content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;width:100%;min-height:70vh;}
        .result-icon{font-size:64px;animation:bounceIn .6s ease-out;}
        .result-title{font-size:32px;font-weight:700;}
        .result-title.win{color:var(--green);} .result-title.lose{color:var(--red);}
        .result-subtitle{font-size:16px;color:var(--text-2);}
        .result-word-box{background:var(--bg-2);border:2px solid var(--border);border-radius:16px;padding:20px 24px;width:100%;max-width:360px;}
        .result-word{font-family:'Fredoka',sans-serif;font-size:28px;font-weight:700;color:var(--gold);letter-spacing:3px;margin-bottom:8px;}
        .result-translation{font-size:16px;color:var(--text-2);}
        .result-stats{display:flex;gap:20px;justify-content:center;margin:8px 0;}
        .result-buttons{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px;}
        .btn-primary{
            padding:14px 24px;font-family:'Fredoka',sans-serif;font-size:18px;font-weight:600;
            color:#fff;background:linear-gradient(135deg,var(--gold),#d4940a);border:none;border-radius:12px;
            cursor:pointer;transition:all .2s ease;text-shadow:0 1px 2px rgba(0,0,0,.2);
        }
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 25px var(--gold-glow);}
        .btn-secondary{
            padding:12px 24px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;
            color:var(--text-2);background:var(--bg-2);border:2px solid var(--border);border-radius:12px;
            cursor:pointer;transition:all .2s ease;
        }
        .btn-secondary:hover{border-color:var(--gold);color:var(--text-1);}

        /* CONFETTI */
        #confetti-container{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden;}
        .confetti-piece{position:absolute;top:-10px;width:8px;height:8px;opacity:0;animation:confettiFall linear forwards;}

        /* TOAST */
        #toast-container{
            position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:200;
            display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;
        }
        .toast{
            padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;color:#fff;
            opacity:0;transform:translateY(-10px);transition:all .3s ease;pointer-events:auto;
            max-width:340px;text-align:center;
        }
        .toast.show{opacity:1;transform:translateY(0);}
        .toast-error{background:var(--red);} .toast-info{background:var(--teal);}

        /* ANIMATIONS */
        @keyframes slideDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
        @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
        @keyframes spin{to{transform:rotate(360deg);}}
        @keyframes letterPop{0%{transform:scale(1.4);}50%{transform:scale(.9);}100%{transform:scale(1);}}
        @keyframes bounceIn{0%{transform:scale(0);opacity:0;}50%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}
        @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}
        @keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
        @keyframes dots{0%{content:'';}25%{content:'.';}50%{content:'..';}75%{content:'...';}}
        .shake{animation:shake .4s ease;}

        @media(max-width:380px){
            .lang-grid{grid-template-columns:1fr;}
            .key-btn{font-size:13px;}
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="toast-container"></div>
        <div id="confetti-container"></div>

        <!-- MENU -->
        <div id="menu-screen" class="screen active">
            <div class="menu-header">
                <span class="menu-icon">🌍</span>
                <h1 class="menu-title">Forca Multilingue</h1>
                <p class="menu-subtitle">Aprenda idiomas jogando!</p>
            </div>
            <div id="connection-status"></div>
            <div class="section-label">Escolha o idioma</div>
            <div class="lang-grid" id="lang-grid"></div>
            <div class="section-label">Nivel de dificuldade</div>
            <div class="diff-grid" id="diff-grid"></div>
            <button class="play-btn" id="play-btn" disabled onclick="startGame()">JOGAR</button>
            <div class="stats-bar">
                <div class="stat-item"><div class="stat-value" id="stats-total">0</div><div class="stat-label">Jogos</div></div>
                <div class="stat-item"><div class="stat-value" id="stats-winrate">0%</div><div class="stat-label">Acertos</div></div>
                <div class="stat-item"><div class="stat-value" id="stats-best">0</div><div class="stat-label">Melhor Seq.</div></div>
            </div>
        </div>

        <!-- LOADING -->
        <div id="loading-screen" class="screen">
            <div class="loading-content">
                <div class="loading-spinner"></div>
                <p class="loading-text">Gerando palavra<span class="loading-dots"></span></p>
                <p class="loading-subtext">A IA esta escolhendo a palavra perfeita para voce!</p>
            </div>
        </div>

        <!-- GAME -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="game-badges">
                    <span class="badge" id="game-lang-badge"></span>
                    <span class="badge" id="game-diff-badge"></span>
                </div>
                <div class="lives-display">
                    <span class="lives-hearts" id="lives-hearts"></span>
                </div>
            </div>
            <div class="hangman-container">
                <svg viewBox="0 0 190 220" class="hangman-svg">
                    <g stroke="var(--gallows)" stroke-width="3" stroke-linecap="round" fill="none">
                        <line x1="20" y1="210" x2="90" y2="210"/>
                        <line x1="55" y1="210" x2="55" y2="25"/>
                        <line x1="55" y1="25" x2="135" y2="25"/>
                        <line x1="135" y1="25" x2="135" y2="45"/>
                        <line x1="55" y1="55" x2="85" y2="25"/>
                    </g>
                    <g stroke="var(--person)" stroke-width="3" stroke-linecap="round" fill="none">
                        <circle cx="135" cy="63" r="18" class="hangman-part" data-part="1"/>
                        <line x1="135" y1="81" x2="135" y2="140" class="hangman-part" data-part="2"/>
                        <line x1="135" y1="100" x2="108" y2="128" class="hangman-part" data-part="3"/>
                        <line x1="135" y1="100" x2="162" y2="128" class="hangman-part" data-part="4"/>
                        <line x1="135" y1="140" x2="108" y2="180" class="hangman-part" data-part="5"/>
                        <line x1="135" y1="140" x2="162" y2="180" class="hangman-part" data-part="6"/>
                    </g>
                </svg>
            </div>
            <div class="hint-box">
                <span class="hint-label">💡 Dica</span>
                <p class="hint-text" id="game-hint"></p>
            </div>
            <div class="word-display" id="word-display"></div>
            <div class="keyboard" id="keyboard"></div>
            <button class="game-back-btn" onclick="backToMenu()">&#8592; Voltar ao menu</button>
        </div>

        <!-- RESULT -->
        <div id="result-screen" class="screen">
            <div class="result-content">
                <div class="result-icon" id="result-icon"></div>
                <h2 class="result-title" id="result-title"></h2>
                <p class="result-subtitle" id="result-subtitle"></p>
                <div class="result-word-box">
                    <div class="result-word" id="result-word"></div>
                    <div class="result-translation" id="result-translation"></div>
                </div>
                <div class="result-stats">
                    <div class="stat-item"><div class="stat-value" id="res-wins">0</div><div class="stat-label">Vitorias</div></div>
                    <div class="stat-item"><div class="stat-value" id="res-losses">0</div><div class="stat-label">Derrotas</div></div>
                    <div class="stat-item"><div class="stat-value" id="res-streak">0</div><div class="stat-label">Sequencia</div></div>
                </div>
                <div class="result-buttons">
                    <button class="btn-primary" onclick="playAgain()">JOGAR NOVAMENTE</button>
                    <button class="btn-secondary" onclick="backToMenu()">ALTERAR CONFIGURACOES</button>
                </div>
            </div>
        </div>
    </div>

<script>
/* ==================== DARK MODE ==================== */
if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.classList.add('dark');
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
    if (e.matches) { document.documentElement.classList.add('dark'); }
    else { document.documentElement.classList.remove('dark'); }
});

/* ==================== API KEY MANAGEMENT ==================== */
var apiKey = null;
var POE_API_URL = 'https://api.poe.com/v1/chat/completions';
var POE_MODEL = 'Grok-4.1-Fast-Non-Reasoning';

function getCookie(name) {
    var cookies = document.cookie.split(';');
    for (var i = 0; i < cookies.length; i++) {
        var cookie = cookies[i].trim();
        if (cookie.indexOf(name + '=') === 0) {
            return cookie.substring(name.length + 1);
        }
    }
    return null;
}

function cleanKeyValue(raw) {
    if (!raw) { return null; }
    var decoded = '';
    try {
        decoded = decodeURIComponent(raw);
    } catch (e) {
        decoded = raw;
    }
    decoded = decoded.replace(/^["']+|["']+$/g, '').trim();
    if (decoded && decoded.length > 10) {
        return decoded;
    }
    return null;
}

function extractApiKey() {
    // 1) If already set manually, keep it
    if (apiKey) { return apiKey; }
    // 2) Try cookie
    var fromCookie = cleanKeyValue(getCookie('estudai_apiKey'));
    if (fromCookie) { return fromCookie; }
    // 3) Try URL params (?estudai_apiKey=...)
    try {
        var params = new URLSearchParams(window.location.search);
        var fromUrl = cleanKeyValue(params.get('estudai_apiKey'));
        if (fromUrl) { return fromUrl; }
    } catch (e) { /* ignore */ }
    return null;
}

function maskKey(key) {
    if (!key) { return ''; }
    if (key.length <= 12) { return key.substring(0, 4) + '***'; }
    return key.substring(0, 7) + '...' + key.substring(key.length - 4);
}

function connectWithKey() {
    var input = document.getElementById('key-input');
    if (!input) { return; }
    var val = input.value.trim();
    // Clean %22 and quotes in case user pastes raw cookie value
    var cleaned = cleanKeyValue(val);
    if (cleaned) {
        apiKey = cleaned;
        renderMenu();
        showToast('Conectado com sucesso!', 'info');
    } else {
        showToast('Chave invalida. Cole a chave sk-poe-...', 'error');
    }
}

function disconnectKey() {
    apiKey = null;
    renderMenu();
}

function renderConnectionStatus() {
    var container = document.getElementById('connection-status');
    var currentKey = extractApiKey();
    apiKey = currentKey;

    if (apiKey) {
        container.innerHTML =
            '<div class="connection-badge connected">' +
                '<span class="connection-dot"></span>' +
                '<span>Conectado</span>' +
            '</div>' +
            '<div class="connection-key-hint">' + maskKey(apiKey) + '</div>' +
            '<button class="key-disconnect-btn" onclick="disconnectKey()">Desconectar</button>';
    } else {
        container.innerHTML =
            '<div class="connection-badge disconnected">' +
                '<span class="connection-dot"></span>' +
                '<span>Desconectado</span>' +
            '</div>' +
            '<div class="key-input-area">' +
                '<div class="key-input-row">' +
                    '<input type="text" id="key-input" class="key-input" placeholder="Cole sua chave sk-poe-..." />' +
                    '<button class="key-connect-btn" onclick="connectWithKey()">Conectar</button>' +
                '</div>' +
            '</div>';
        // Allow Enter key to connect
        setTimeout(function() {
            var inp = document.getElementById('key-input');
            if (inp) {
                inp.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') { connectWithKey(); }
                });
            }
        }, 50);
    }
}

/* ==================== POE API (fetch) ==================== */
function callPoeAPI(promptText) {
    return fetch(POE_API_URL, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + apiKey
        },
        body: JSON.stringify({
            model: POE_MODEL,
            messages: [
                { role: 'user', content: promptText }
            ]
        })
    })
    .then(function(response) {
        if (!response.ok) {
            return response.text().then(function(body) {
                throw new Error('API erro ' + response.status + ': ' + body);
            });
        }
        return response.json();
    })
    .then(function(data) {
        if (data.choices && data.choices.length > 0 && data.choices[0].message) {
            return data.choices[0].message.content;
        }
        throw new Error('Resposta inesperada da API');
    });
}

/* ==================== CONSTANTS ==================== */
var LANGUAGES = [
    { id:'ingles', name:'Ingles', flag:'\u{1F1EC}\u{1F1E7}', aiName:'ingles' },
    { id:'espanhol', name:'Espanhol', flag:'\u{1F1EA}\u{1F1F8}', aiName:'espanhol' },
    { id:'frances', name:'Frances', flag:'\u{1F1EB}\u{1F1F7}', aiName:'frances' },
    { id:'alemao', name:'Alemao', flag:'\u{1F1E9}\u{1F1EA}', aiName:'alemao' },
    { id:'italiano', name:'Italiano', flag:'\u{1F1EE}\u{1F1F9}', aiName:'italiano' },
    { id:'japones', name:'Japones (Romaji)', flag:'\u{1F1EF}\u{1F1F5}', aiName:'japones (romanizado em romaji, sem espacos)' },
    { id:'coreano', name:'Coreano (Roman.)', flag:'\u{1F1F0}\u{1F1F7}', aiName:'coreano (romanizado, sem espacos)' },
    { id:'mandarim', name:'Mandarim (Pinyin)', flag:'\u{1F1E8}\u{1F1F3}', aiName:'mandarim chines (pinyin sem tons e sem espacos)' }
];

var DIFFICULTIES = [
    { id:'facil', name:'Facil', stars:1, desc:'3-5 letras' },
    { id:'medio', name:'Medio', stars:2, desc:'5-7 letras' },
    { id:'dificil', name:'Dificil', stars:3, desc:'7+ letras' }
];

var MAX_WRONG = 6;

/* ==================== STATE ==================== */
var state = {
    language: null,
    difficulty: null,
    word: '',
    hint: '',
    translation: '',
    guessedLetters: {},
    wrongGuesses: 0,
    score: { wins:0, losses:0, streak:0, bestStreak:0 },
    usedWords: {},
    retryCount: 0,
    gameActive: false,
    gameOver: false
};

/* ==================== HELPERS ==================== */
function showScreen(id) {
    var screens = document.querySelectorAll('.screen');
    for (var i = 0; i < screens.length; i++) { screens[i].classList.remove('active'); }
    var el = document.getElementById(id + '-screen');
    if (el) { el.classList.add('active'); }
}

function showToast(message, type) {
    var container = document.getElementById('toast-container');
    var toast = document.createElement('div');
    toast.className = 'toast toast-' + (type || 'info');
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(function() { toast.classList.add('show'); }, 10);
    setTimeout(function() {
        toast.classList.remove('show');
        setTimeout(function() { toast.remove(); }, 300);
    }, 3500);
}

function getUsedWordsForLang() {
    if (!state.usedWords[state.language]) { state.usedWords[state.language] = []; }
    return state.usedWords[state.language];
}

/* ==================== MENU ==================== */
function renderMenu() {
    renderConnectionStatus();

    var langGrid = document.getElementById('lang-grid');
    langGrid.innerHTML = LANGUAGES.map(function(l) {
        return '<button class="lang-card ' + (state.language === l.id ? 'selected' : '') +
            '" onclick="selectLang(\'' + l.id + '\')">' +
            '<span class="lang-flag">' + l.flag + '</span><span>' + l.name + '</span></button>';
    }).join('');

    var diffGrid = document.getElementById('diff-grid');
    diffGrid.innerHTML = DIFFICULTIES.map(function(d) {
        var starsStr = '';
        for (var i = 0; i < 3; i++) { starsStr += i < d.stars ? '\u2605' : '\u2606'; }
        return '<button class="diff-btn ' + (state.difficulty === d.id ? 'selected' : '') +
            '" onclick="selectDiff(\'' + d.id + '\')">' +
            '<span class="diff-stars">' + starsStr + '</span>' +
            '<span class="diff-name">' + d.name + '</span>' +
            '<span class="diff-desc">' + d.desc + '</span></button>';
    }).join('');

    // Button disabled if no lang, no diff, OR no API key
    var canPlay = state.language && state.difficulty && apiKey;
    document.getElementById('play-btn').disabled = !canPlay;

    var total = state.score.wins + state.score.losses;
    document.getElementById('stats-total').textContent = total;
    document.getElementById('stats-winrate').textContent = total > 0 ? Math.round((state.score.wins / total) * 100) + '%' : '0%';
    document.getElementById('stats-best').textContent = state.score.bestStreak;
}

function selectLang(id) { state.language = id; renderMenu(); }
function selectDiff(id) { state.difficulty = id; renderMenu(); }

function backToMenu() {
    state.gameActive = false;
    state.gameOver = false;
    renderMenu();
    showScreen('menu');
}

/* ==================== AI INTEGRATION (fetch) ==================== */
function parseJSON(text) {
    var s = text;
    var codeBlock = s.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (codeBlock) { s = codeBlock[1]; }
    var obj = s.match(/\{[\s\S]*?\}/);
    if (obj) { s = obj[0]; }
    return JSON.parse(s.trim());
}

function buildPrompt() {
    var lang = LANGUAGES.find(function(l) { return l.id === state.language; });
    var diff = DIFFICULTIES.find(function(d) { return d.id === state.difficulty; });

    var used = getUsedWordsForLang();
    var usedList = used.slice(-30).join(', ');

    var diffDesc;
    if (diff.id === 'facil') { diffDesc = 'Facil: palavras muito comuns e basicas do dia a dia, entre 3 e 5 letras'; }
    else if (diff.id === 'medio') { diffDesc = 'Medio: palavras comuns mas menos basicas, entre 5 e 7 letras'; }
    else { diffDesc = 'Dificil: palavras complexas, tecnicas ou pouco comuns, com 7 ou mais letras'; }

    return 'Gere UMA palavra em ' + lang.aiName + ' para um jogo da forca.\n\n' +
        'Nivel de dificuldade: ' + diffDesc + '\n\n' +
        'REGRAS:\n' +
        '1. A palavra deve conter APENAS letras de A a Z (sem acentos, cedilha, espacos ou hifens)\n' +
        '2. A dica deve ser em portugues do Brasil, clara e util para o jogador adivinhar\n' +
        '3. A traducao deve ser em portugues do Brasil\n' +
        '4. Responda SOMENTE com um JSON valido, sem nenhum texto antes ou depois\n' +
        (usedList ? '5. NAO use estas palavras ja usadas: ' + usedList + '\n' : '') +
        '\nFormato exato:\n{"word":"PALAVRA","hint":"dica em portugues","translation":"traducao em portugues"}';
}

function requestNewWord() {
    showScreen('loading');

    if (!apiKey) {
        showToast('Chave API nao encontrada. Verifique o cookie estudai_apiKey.', 'error');
        showScreen('menu');
        return;
    }

    var prompt = buildPrompt();

    callPoeAPI(prompt)
        .then(function(content) {
            try {
                var data = parseJSON(content);
                if (!data.word || !data.hint) { throw new Error('Missing fields'); }

                var clean = data.word.toUpperCase().replace(/[^A-Z]/g, '');
                if (clean.length < 2) { throw new Error('Word too short'); }

                var used = getUsedWordsForLang();
                if (used.indexOf(clean) !== -1) {
                    state.retryCount++;
                    if (state.retryCount > 3) {
                        state.usedWords[state.language] = used.slice(-5);
                        state.retryCount = 0;
                    }
                    requestNewWord();
                    return;
                }

                state.retryCount = 0;
                used.push(clean);
                initGame(clean, data.hint, data.translation || data.word);
            } catch (e) {
                state.retryCount++;
                if (state.retryCount > 3) {
                    showToast('Nao foi possivel gerar uma palavra. Tente novamente.', 'error');
                    state.retryCount = 0;
                    showScreen('menu');
                    return;
                }
                requestNewWord();
            }
        })
        .catch(function(err) {
            showToast('Erro na API: ' + (err.message || 'Tente novamente'), 'error');
            showScreen('menu');
        });
}

/* ==================== GAME LOGIC ==================== */
function startGame() {
    if (!state.language || !state.difficulty || !apiKey) { return; }
    state.retryCount = 0;
    requestNewWord();
}

function playAgain() {
    state.retryCount = 0;
    requestNewWord();
}

function initGame(word, hint, translation) {
    state.word = word;
    state.hint = hint;
    state.translation = translation;
    state.guessedLetters = {};
    state.wrongGuesses = 0;
    state.gameActive = true;
    state.gameOver = false;
    renderGame();
    showScreen('game');
}

function guessLetter(letter) {
    if (!state.gameActive || state.gameOver) { return; }
    if (state.guessedLetters[letter]) { return; }

    state.guessedLetters[letter] = true;

    if (state.word.indexOf(letter) === -1) {
        state.wrongGuesses++;
        var container = document.querySelector('.hangman-container');
        if (container) {
            container.classList.add('shake');
            setTimeout(function() { container.classList.remove('shake'); }, 400);
        }
    }

    renderGame();

    if (isWordComplete()) {
        state.gameOver = true;
        setTimeout(function() { showResult(true); }, 600);
    } else if (state.wrongGuesses >= MAX_WRONG) {
        state.gameOver = true;
        setTimeout(function() { showResult(false); }, 600);
    }
}

function isWordComplete() {
    for (var i = 0; i < state.word.length; i++) {
        if (!state.guessedLetters[state.word[i]]) { return false; }
    }
    return true;
}

/* ==================== GAME RENDER ==================== */
function renderGame() {
    var parts = document.querySelectorAll('.hangman-part');
    for (var i = 0; i < parts.length; i++) {
        var partNum = parseInt(parts[i].getAttribute('data-part'), 10);
        if (partNum <= state.wrongGuesses) { parts[i].classList.add('visible'); }
        else { parts[i].classList.remove('visible'); }
    }

    var heartsStr = '';
    for (var h = 0; h < MAX_WRONG; h++) {
        heartsStr += h < (MAX_WRONG - state.wrongGuesses) ? '\u2764\uFE0F' : '\u{1F5A4}';
    }
    document.getElementById('lives-hearts').innerHTML = heartsStr;

    document.getElementById('game-hint').textContent = state.hint;

    var lang = LANGUAGES.find(function(l) { return l.id === state.language; });
    var diff = DIFFICULTIES.find(function(d) { return d.id === state.difficulty; });
    document.getElementById('game-lang-badge').textContent = lang.flag + ' ' + lang.name;
    document.getElementById('game-diff-badge').textContent = diff.name;

    var wordHTML = '';
    for (var w = 0; w < state.word.length; w++) {
        var ch = state.word[w];
        var revealed = !!state.guessedLetters[ch];
        var showOnLoss = state.gameOver && !revealed && state.wrongGuesses >= MAX_WRONG;
        var cls = 'letter-box';
        if (revealed) { cls += ' revealed'; }
        else if (showOnLoss) { cls += ' wrong-reveal'; }
        wordHTML += '<span class="' + cls + '">' + (revealed || showOnLoss ? ch : '') + '</span>';
    }
    document.getElementById('word-display').innerHTML = wordHTML;

    renderKeyboard();
}

function renderKeyboard() {
    var rows = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
    var html = '';
    for (var r = 0; r < rows.length; r++) {
        html += '<div class="keyboard-row">';
        for (var k = 0; k < rows[r].length; k++) {
            var letter = rows[r][k];
            var guessed = !!state.guessedLetters[letter];
            var correct = guessed && state.word.indexOf(letter) !== -1;
            var wrong = guessed && state.word.indexOf(letter) === -1;
            var cls = 'key-btn';
            if (correct) { cls += ' correct'; }
            if (wrong) { cls += ' wrong'; }
            html += '<button class="' + cls + '" onclick="guessLetter(\'' + letter + '\')" ' +
                (guessed || state.gameOver ? 'disabled' : '') + '>' + letter + '</button>';
        }
        html += '</div>';
    }
    document.getElementById('keyboard').innerHTML = html;
}

/* ==================== RESULT ==================== */
function showResult(won) {
    if (won) {
        state.score.wins++;
        state.score.streak++;
        state.score.bestStreak = Math.max(state.score.bestStreak, state.score.streak);
        createConfetti();
    } else {
        state.score.losses++;
        state.score.streak = 0;
    }

    document.getElementById('result-icon').textContent = won ? '\u{1F389}' : '\u{1F480}';
    var titleEl = document.getElementById('result-title');
    titleEl.textContent = won ? 'Parabens!' : 'Que pena!';
    titleEl.className = 'result-title ' + (won ? 'win' : 'lose');
    document.getElementById('result-subtitle').textContent = won ? 'Voce acertou a palavra!' : 'A palavra era:';
    document.getElementById('result-word').textContent = state.word;
    document.getElementById('result-translation').textContent = state.translation;
    document.getElementById('res-wins').textContent = state.score.wins;
    document.getElementById('res-losses').textContent = state.score.losses;
    document.getElementById('res-streak').textContent = state.score.streak;

    showScreen('result');
}

/* ==================== CONFETTI ==================== */
function createConfetti() {
    var container = document.getElementById('confetti-container');
    container.innerHTML = '';
    var colors = ['#f5b731','#2dd4a8','#ef6461','#5b9cf5','#ff6b9d','#ffd93d'];
    for (var i = 0; i < 50; i++) {
        var piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = (Math.random() * 2) + 's';
        piece.style.animationDuration = (2 + Math.random() * 3) + 's';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.width = (6 + Math.random() * 6) + 'px';
        piece.style.height = (6 + Math.random() * 6) + 'px';
        container.appendChild(piece);
    }
    setTimeout(function() { container.innerHTML = ''; }, 5000);
}

/* ==================== KEYBOARD INPUT ==================== */
document.addEventListener('keydown', function(e) {
    if (!state.gameActive || state.gameOver) { return; }
    var letter = e.key.toUpperCase();
    if (/^[A-Z]$/.test(letter)) {
        guessLetter(letter);
    }
});

/* ==================== INIT ==================== */
renderMenu();
showScreen('menu');
</script>
